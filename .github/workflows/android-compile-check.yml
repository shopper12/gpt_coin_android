name: Android Kotlin compile check

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/android-compile-check.yml'

permissions:
  contents: write

concurrency:
  group: android-compile-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile debug Kotlin
        id: compile
        continue-on-error: true
        run: bash ./gradlew :app:compileDebugKotlin --stacktrace

      - name: Record compile result
        if: always()
        env:
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
        run: |
          set -euo pipefail
          mkdir -p reports
          python - <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path

          outcome = os.environ.get('COMPILE_OUTCOME', 'unknown')
          payload = {
              'ok': outcome == 'success',
              'outcome': outcome,
              'generated_at_utc': dt.datetime.now(dt.timezone.utc).isoformat(),
              'compiled_commit': os.environ['GITHUB_SHA'],
              'workflow_run_id': os.environ['GITHUB_RUN_ID'],
              'workflow_run_number': int(os.environ['GITHUB_RUN_NUMBER']),
              'task': ':app:compileDebugKotlin',
          }
          Path('reports/android_compile_status.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/android_compile_status.json
          git commit -m "Record Android Kotlin compile result"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Fail workflow when compilation failed
        if: steps.compile.outcome != 'success'
        run: exit 1
