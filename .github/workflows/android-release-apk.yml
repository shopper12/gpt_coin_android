name: Build Android release APK

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. This runs every day at 03:17 UTC / 12:17 KST.
    # Scheduled workflows run only from the repository default branch, so this file must also exist on main.
    - cron: '17 3 * * *'
  push:
    branches:
      - fix/runtime-phone-error
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-release-apk.yml'

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scheduled source branch
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4
        with:
          ref: fix/runtime-phone-error

      - name: Checkout triggering ref
        if: github.event_name != 'schedule'
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decode signing key
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release-key.jks"

      - name: Build release APK
        env:
          CI_KEYSTORE_FILE: ${{ runner.temp }}/release-key.jks
          CI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          CI_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          CI_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash ./gradlew :app:assembleRelease

      - name: Copy APK
        run: |
          mkdir -p release-apk
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk release-apk/crypto-trade-coach-release.apk
          else
            echo "Release APK was not produced. Check signing secrets and Gradle output."
            find app/build/outputs/apk/release -maxdepth 1 -type f -print || true
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: crypto-trade-coach-release-apk
          path: release-apk/crypto-trade-coach-release.apk

      - name: Publish rolling GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-phone-apk
          name: Latest phone APK
          body: |
            Android release APK built from `${{ github.event_name == 'schedule' && 'fix/runtime-phone-error' || github.ref_name }}`.

            Download `crypto-trade-coach-release.apk` from Assets on the phone and install/update it.
          files: release-apk/crypto-trade-coach-release.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
