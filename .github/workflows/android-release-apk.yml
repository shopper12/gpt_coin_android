name: Build Android APK

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches:
      - fix/runtime-phone-error
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-release-apk.yml'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scheduled source branch
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4
        with:
          ref: fix/runtime-phone-error

      - name: Checkout triggering ref
        if: github.event_name != 'schedule'
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        run: bash ./gradlew :app:assembleDebug

      - name: Copy APK
        run: |
          mkdir -p apk-output
          cp app/build/outputs/apk/debug/app-debug.apk apk-output/crypto-trade-coach-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: crypto-trade-coach-debug-apk
          path: apk-output/crypto-trade-coach-debug.apk
