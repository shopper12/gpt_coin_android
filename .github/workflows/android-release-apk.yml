name: Build Android release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle.properties'
      - 'gradlew'
      - '.github/workflows/android-release-apk.yml'
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

concurrency:
  group: android-release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate release signing inputs
        env:
          SIGNING_KEY_B64_VALUE: ${{ secrets.SIGNING_KEY_B64 }}
          SIGNING_STORE_PASS_VALUE: ${{ secrets.SIGNING_STORE_PASS }}
          SIGNING_KEY_ALIAS_VALUE: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          missing=0
          if [ -z "$SIGNING_KEY_B64_VALUE" ]; then echo "Missing SIGNING_KEY_B64"; missing=1; fi
          if [ -z "$SIGNING_STORE_PASS_VALUE" ]; then echo "Missing SIGNING_STORE_PASS"; missing=1; fi
          if [ -z "$SIGNING_KEY_ALIAS_VALUE" ]; then echo "Missing SIGNING_KEY_ALIAS"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Decode signing key
        env:
          SIGNING_KEY_B64_VALUE: ${{ secrets.SIGNING_KEY_B64 }}
        run: |
          echo "$SIGNING_KEY_B64_VALUE" | base64 --decode > "$RUNNER_TEMP/release-key.jks"
          test -s "$RUNNER_TEMP/release-key.jks"

      - name: Build release APK
        env:
          CI_KEYSTORE_FILE: ${{ runner.temp }}/release-key.jks
          CI_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASS }}
          CI_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          CI_KEY_PASSWORD: ${{ secrets.SIGNING_STORE_PASS }}
          CI_VERSION_CODE: ${{ github.run_number }}
          CI_VERSION_NAME: 1.0.${{ github.run_number }}
        run: bash ./gradlew :app:assembleRelease --stacktrace

      - name: Copy APK
        run: |
          mkdir -p apk-output
          echo "Release output files:"
          find app/build/outputs/apk/release -maxdepth 1 -type f -print || true
          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No release APK was produced. The release build probably failed before packaging."
            exit 1
          fi
          cp "$apk_path" apk-output/crypto-trade-coach-release.apk

      - name: Verify installable APK
        run: |
          set -euo pipefail
          apk="apk-output/crypto-trade-coach-release.apk"
          test -s "$apk"
          bytes="$(wc -c < "$apk")"
          echo "APK bytes: $bytes"
          if [ "$bytes" -lt 1048576 ]; then
            echo "APK is too small; it is probably not a real APK."
            exit 1
          fi
          file "$apk" | tee apk-output/file-type.txt
          unzip -t "$apk" > apk-output/unzip-test.txt

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          if [ ! -x "$APKSIGNER" ]; then
            echo "apksigner not found under ANDROID_HOME/build-tools"
            exit 1
          fi
          "$APKSIGNER" verify --verbose --print-certs "$apk" | tee apk-output/apksigner-verify.txt

          AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -n 1 || true)"
          AAPT2="$(find "$ANDROID_HOME/build-tools" -name aapt2 -type f | sort -V | tail -n 1 || true)"
          : > apk-output/badging.txt
          if [ -x "$AAPT" ]; then
            "$AAPT" dump badging "$apk" | tee apk-output/badging.txt
            grep "package: name='com.cryptotradecoach'" apk-output/badging.txt
          elif command -v apkanalyzer >/dev/null 2>&1; then
            package_name="$(apkanalyzer manifest application-id "$apk")"
            echo "package: $package_name" | tee apk-output/badging.txt
            test "$package_name" = "com.cryptotradecoach"
          elif [ -x "$AAPT2" ]; then
            "$AAPT2" dump packagename "$apk" | tee apk-output/badging.txt
            grep "com.cryptotradecoach" apk-output/badging.txt
          else
            echo "No aapt/aapt2/apkanalyzer found; package-name check skipped after unzip and apksigner verification." | tee apk-output/badging.txt
          fi

          sha256sum "$apk" | tee apk-output/sha256.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: crypto-trade-coach-release-apk
          path: |
            apk-output/crypto-trade-coach-release.apk
            apk-output/file-type.txt
            apk-output/unzip-test.txt
            apk-output/apksigner-verify.txt
            apk-output/badging.txt
            apk-output/sha256.txt

      - name: Publish rolling GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-phone-apk
          name: Latest phone APK
          body: |
            Android release APK built from `main`.

            Download `crypto-trade-coach-release.apk` from Assets on the phone and install/update it.

            If Android says the package is invalid or conflicts with an existing package, uninstall the old `Crypto Trade Coach` app once, then install this release APK again. This usually happens when the old app was installed with a different signing key.

            commit: ${{ github.sha }}
            versionCode: ${{ github.run_number }}
            versionName: 1.0.${{ github.run_number }}
          files: apk-output/crypto-trade-coach-release.apk
          prerelease: true
          make_latest: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
