name: Build Android release APK

run-name: APK for ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/android-release-apk.yml'

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

env:
  APK_FILE_NAME: unified-trading-coach-release.apk

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set release version
        run: |
          version_code="$(date -u +%s)"
          version_name="1.0.${GITHUB_RUN_NUMBER}"
          echo "CI_VERSION_CODE=$version_code" >> "$GITHUB_ENV"
          echo "CI_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "Release versionCode=$version_code versionName=$version_name"

      - name: Validate release signing inputs
        env:
          SIGNING_KEY_B64_VALUE: ${{ secrets.SIGNING_KEY_B64 }}
          SIGNING_STORE_PASS_VALUE: ${{ secrets.SIGNING_STORE_PASS }}
          SIGNING_KEY_ALIAS_VALUE: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          missing=0
          if [ -z "$SIGNING_KEY_B64_VALUE" ]; then echo "Missing SIGNING_KEY_B64"; missing=1; fi
          if [ -z "$SIGNING_STORE_PASS_VALUE" ]; then echo "Missing SIGNING_STORE_PASS"; missing=1; fi
          if [ -z "$SIGNING_KEY_ALIAS_VALUE" ]; then echo "Missing SIGNING_KEY_ALIAS"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Decode signing key
        env:
          SIGNING_KEY_B64_VALUE: ${{ secrets.SIGNING_KEY_B64 }}
        run: |
          echo "$SIGNING_KEY_B64_VALUE" | base64 --decode > "$RUNNER_TEMP/release-key.jks"
          test -s "$RUNNER_TEMP/release-key.jks"

      - name: Build signed release APK
        env:
          CI_KEYSTORE_FILE: ${{ runner.temp }}/release-key.jks
          CI_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASS }}
          CI_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          CI_KEY_PASSWORD: ${{ secrets.SIGNING_STORE_PASS }}
        run: bash ./gradlew :app:assembleRelease --stacktrace

      - name: Copy APK
        run: |
          set -euo pipefail
          mkdir -p apk-output
          short_sha="${GITHUB_SHA::7}"
          versioned_apk="unified-trading-coach-release-v${CI_VERSION_CODE}-${short_sha}.apk"
          echo "VERSIONED_APK=$versioned_apk" >> "$GITHUB_ENV"
          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No release APK was produced."
            exit 1
          fi
          cp "$apk_path" "apk-output/$APK_FILE_NAME"
          cp "$apk_path" "apk-output/$versioned_apk"

      - name: Verify APK file and signature
        run: |
          set -euo pipefail
          apk="apk-output/$APK_FILE_NAME"
          test -s "$apk"
          bytes="$(wc -c < "$apk")"
          echo "APK bytes: $bytes"
          if [ "$bytes" -lt 1048576 ]; then
            echo "APK is too small; it is probably not a real APK."
            exit 1
          fi
          file "$apk" | tee apk-output/file-type.txt
          unzip -t "$apk" | tee apk-output/unzip-test.txt
          sha256sum "$apk" | tee apk-output/sha256.txt
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$apk" | tee apk-output/apksigner-verify.txt

      - name: Inspect APK package metadata
        continue-on-error: true
        run: |
          set -u
          apk="apk-output/$APK_FILE_NAME"
          AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -n 1 || true)"
          : > apk-output/badging.txt
          if [ -x "$AAPT" ]; then
            "$AAPT" dump badging "$apk" 2>&1 | tee apk-output/badging.txt || true
            grep -q "package: name='com.cryptotradecoach'" apk-output/badging.txt \
              || echo "::warning::aapt package line did not match expected legacy-compatible package id"
            grep -Fq "Unified Trading Coach" apk-output/badging.txt \
              || echo "::warning::aapt did not render the application label in the expected text form"
            grep -q "sdkVersion:'26'" apk-output/badging.txt \
              || echo "::warning::aapt minSdk line did not match expected text form"
          else
            echo "aapt not found; package metadata text inspection skipped" | tee apk-output/badging.txt
          fi
          echo "Runtime updater performs strict package, app-label, and signing-certificate validation before installation."

      - name: Write phone installation guide
        run: |
          cat > apk-output/INSTALL.txt <<'EOF'
          PHONE INSTALLATION
          1. Download unified-trading-coach-release.apk from GitHub Releases, not the Android Debug Verification artifact.
          2. If an older debug or Crypto Trade Coach build is installed with a different signature, uninstall that app once.
          3. Allow installation from the browser, file manager, or Unified Trading Coach used to open the APK.
          4. Android 8.0 or newer is required.
          5. Future release APKs from this workflow use the persistent release signing key and can update normally.
          EOF

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: unified-trading-coach-release-apk-${{ github.run_number }}-${{ github.sha }}
          path: |
            apk-output/*.apk
            apk-output/INSTALL.txt
            apk-output/file-type.txt
            apk-output/unzip-test.txt
            apk-output/apksigner-verify.txt
            apk-output/badging.txt
            apk-output/sha256.txt
          retention-days: 14

      - name: Publish rolling GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-phone-apk
          name: Latest Unified Trading Coach APK
          body: |
            Signed Android release APK for Unified Trading Coach.

            Download `unified-trading-coach-release.apk` from Assets and install it directly.

            The updater accepts only this exact unified APK name and verifies the package, app label, and signing certificate before opening Android's installer.

            Important: if a previous debug or Crypto Trade Coach APK is already installed with a different signing key, uninstall it once before installing this release. After this one-time cleanup, later release APKs can update normally.

            Android 8.0 or newer is required.
            package: `com.cryptotradecoach`
            appLabel: `Unified Trading Coach`
            commit: ${{ github.sha }}
            versionCode: ${{ env.CI_VERSION_CODE }}
            versionName: ${{ env.CI_VERSION_NAME }}
          files: |
            apk-output/unified-trading-coach-release.apk
            apk-output/${{ env.VERSIONED_APK }}
            apk-output/INSTALL.txt
          prerelease: true
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Remove stale APK assets from rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/latest-phone-apk" \
            --jq '.assets[] | [.id, .name] | @tsv' |
          while IFS=$'\t' read -r asset_id asset_name; do
            if [[ "$asset_name" == *.apk && "$asset_name" != "$APK_FILE_NAME" && "$asset_name" != "$VERSIONED_APK" ]]; then
              echo "Deleting stale APK asset: $asset_name"
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/$asset_id"
            fi
          done

      - name: Record successful Android build
        run: |
          set -euo pipefail
          mkdir -p reports
          apk_bytes="$(wc -c < "apk-output/$APK_FILE_NAME" | tr -d ' ')"
          apk_sha256="$(cut -d' ' -f1 apk-output/sha256.txt)"
          APK_BYTES="$apk_bytes" APK_SHA256="$apk_sha256" python - <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path

          payload = {
              "ok": True,
              "generated_at_utc": dt.datetime.now(dt.timezone.utc).isoformat(),
              "built_commit": os.environ["GITHUB_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_number": int(os.environ["GITHUB_RUN_NUMBER"]),
              "version_code": os.environ["CI_VERSION_CODE"],
              "version_name": os.environ["CI_VERSION_NAME"],
              "package_name": "com.cryptotradecoach",
              "app_label": "Unified Trading Coach",
              "apk_file": os.environ["APK_FILE_NAME"],
              "apk_bytes": int(os.environ["APK_BYTES"]),
              "apk_sha256": os.environ["APK_SHA256"],
              "signature_verified": True,
              "release_tag": "latest-phone-apk",
          }
          Path("reports/android_build_status.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/android_build_status.json
          git commit -m "Record successful Android release build"
          git pull --rebase origin main
          git push origin HEAD:main
