name: Update recommendation history prices

on:
  workflow_dispatch:
  schedule:
    - cron: '20 22 * * 1-5'
  push:
    branches: [ main ]
    paths:
      - 'tools/update_recommendation_history_prices.py'
      - '.github/workflows/update-recommendation-history-prices.yml'

permissions:
  contents: write

concurrency:
  group: recommendation-history-price-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Backfill reference prices and refresh latest closes
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          if [ ! -f reports/chatgpt_recommendation_history.json ]; then
            echo "::warning::reports/chatgpt_recommendation_history.json missing; skipping price refresh"
            exit 0
          fi
          python tools/update_recommendation_history_prices.py

      - name: Commit updated recommendation performance
        run: |
          set -euo pipefail
          if git diff --quiet -- reports/chatgpt_recommendation_history.json; then
            echo "No price changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/chatgpt_recommendation_history.json
          git commit -m "Update recommendation history prices and sparklines"
          git pull --rebase origin main
          git push origin HEAD:main
