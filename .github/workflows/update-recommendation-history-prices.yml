name: Update recommendation history prices

on:
  workflow_dispatch:
  schedule:
    - cron: '20 22 * * 1-5'

permissions:
  contents: write

concurrency:
  group: recommendation-history-price-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Backfill reference prices and refresh latest closes
        run: python tools/update_recommendation_history_prices.py
      - name: Commit updated recommendation performance
        run: |
          if git diff --quiet -- reports/chatgpt_recommendation_history.json; then
            echo "No price changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/chatgpt_recommendation_history.json
          git commit -m "Update recommendation history prices"
          git push
