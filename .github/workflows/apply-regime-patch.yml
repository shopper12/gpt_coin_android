name: Apply Regime Patch

on:
  push:
    branches: [ main ]
    paths:
      - tools/apply_regime_patch.py
      - .github/workflows/apply-regime-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-regime-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply patch
        run: python3 tools/apply_regime_patch.py

      - name: Verify changed files
        run: git diff -- app/src/main/java/com/cryptotradecoach/domain/SignalEngine.kt app/src/main/java/com/cryptotradecoach/service/CoinScannerService.kt app/src/main/java/com/cryptotradecoach/ui/MainViewModel.kt

      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/cryptotradecoach/domain/SignalEngine.kt app/src/main/java/com/cryptotradecoach/service/CoinScannerService.kt app/src/main/java/com/cryptotradecoach/ui/MainViewModel.kt
          git commit -m "Apply BTC regime gating to signal engine"
          git push
