name: Auto rules proposal

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Historical days to fetch'
        required: true
        default: '7'
      max_markets:
        description: 'Top KRW markets by current trade value'
        required: true
        default: '60'
      minimum_score:
        description: 'Minimum strategy score'
        required: true
        default: '65'

permissions:
  contents: read

jobs:
  propose-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backtest
        run: |
          python tools/backtest_upbit_strategies.py \
            --days "${{ github.event.inputs.days }}" \
            --max-markets "${{ github.event.inputs.max_markets }}" \
            --minimum-score "${{ github.event.inputs.minimum_score }}" \
            --out-dir reports

      - name: Generate rules proposal
        run: |
          python tools/auto_tune_rules.py \
            --backtest reports/backtest_latest.json \
            --rules rules/strategy-rules.json \
            --out-rules reports/proposed_strategy_rules.json \
            --out-plan reports/rules_update_plan.md \
            --out-env reports/auto_tune_decision.env

      - name: Upload proposal
        uses: actions/upload-artifact@v4
        with:
          name: auto-rules-proposal
          path: |
            reports/backtest_latest.json
            reports/backtest_latest.md
            reports/proposed_strategy_rules.json
            reports/rules_update_plan.md
            reports/auto_tune_decision.env
          if-no-files-found: error
