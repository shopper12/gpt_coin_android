name: Android emulator smoke test

on:
  workflow_dispatch:
  push:
    branches:
      - fix/runtime-phone-error
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'tools/android-emulator-smoke.sh'
      - '.github/workflows/android-emulator-smoke.yml'

permissions:
  contents: read

jobs:
  emulator-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK for emulator
        run: bash ./gradlew :app:assembleDebug --stacktrace

      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 300
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          emulator-boot-timeout: 600
          disable-animations: true
          disk-size: 6000M
          script: bash tools/android-emulator-smoke.sh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload smoke output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-smoke-output
          path: smoke-output
          if-no-files-found: warn
