name: Android emulator smoke test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  emulator-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 300
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM for Android emulator
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            ls -l /dev/kvm
          else
            echo "WARN: /dev/kvm is not available on this runner. Emulator may boot slowly or fail."
          fi

      - name: Build debug APK for emulator
        run: bash ./gradlew :app:assembleDebug --stacktrace

      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 300
        with:
          api-level: 29
          target: default
          arch: x86_64
          emulator-boot-timeout: 900
          disable-animations: true
          disk-size: 6000M
          script: |
            adb devices -l
            bash tools/android-emulator-smoke.sh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload smoke output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-smoke-output
          path: smoke-output
          if-no-files-found: warn
