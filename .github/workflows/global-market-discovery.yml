name: Global market full-universe discovery

on:
  schedule:
    - cron: '20 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: global-market-data-pipeline
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install discovery dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas yfinance pykrx requests

      - name: Compile scanner modules
        run: |
          python -m py_compile \
            tools/global_market_strategy.py \
            tools/global_market_universe.py \
            tools/global_market_monitor.py

      - name: Discover all listed symbols and rebuild liquid shortlist
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          python tools/global_market_monitor.py \
            --mode full \
            --us-limit 1200 \
            --kr-limit 800 \
            --shortlist-size 300

      - name: Commit shortlist, signals and history
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            reports/global_market_shortlist.json \
            reports/global_market_signals_latest.json \
            reports/global_market_recommendation_history.json
          if git diff --cached --quiet; then
            echo "No global discovery changes."
            exit 0
          fi
          git commit -m "Refresh global liquid market universe"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload discovery output
        uses: actions/upload-artifact@v4
        with:
          name: global-market-discovery-${{ github.run_number }}
          path: |
            reports/global_market_shortlist.json
            reports/global_market_signals_latest.json
            reports/global_market_recommendation_history.json
          retention-days: 14
