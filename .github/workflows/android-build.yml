name: Android Build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI_VERSION_CODE: ${{ github.run_number }}
      CI_VERSION_NAME: 1.0.${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew || true

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build-debug.log

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log
          retention-days: 7

      - name: Normalize APK name
        run: |
          mkdir -p debug-output
          cp app/build/outputs/apk/debug/*.apk debug-output/crypto-trade-coach-debug-v${CI_VERSION_CODE}.apk

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: debug-output/crypto-trade-coach-debug-v${{ github.run_number }}.apk
          retention-days: 7
