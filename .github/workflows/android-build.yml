name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew || true

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Normalize APK name
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/crypto-trade-coach-release.apk

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: release/crypto-trade-coach-release.apk

      - name: Publish latest-phone-apk release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-phone-apk
          name: Latest phone APK
          body: |
            Automated debug APK build for phone installation.
            Commit: ${{ github.sha }}
          files: release/crypto-trade-coach-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
