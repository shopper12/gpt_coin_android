name: Android Debug Verification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set debug version
        run: |
          echo "CI_VERSION_CODE=$(date -u +%s)" >> "$GITHUB_ENV"
          echo "CI_VERSION_NAME=debug-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew || true

      - name: Build debug APK for compile verification only
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build-debug.log

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log
          retention-days: 7

      - name: Explain phone APK source
        run: |
          echo "Debug APK is not published because GitHub-hosted debug signing keys are temporary."
          echo "Install the signed APK from Releases > Latest phone APK instead."
