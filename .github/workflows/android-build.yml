name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    env:
      CI_VERSION_CODE: ${{ github.run_number }}
      CI_VERSION_NAME: 1.0.${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew || true

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build-debug.log

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build-debug.log

      - name: Normalize APK name
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/crypto-trade-coach-v${CI_VERSION_CODE}.apk

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: release/crypto-trade-coach-v${{ github.run_number }}.apk

      - name: Publish latest-phone-apk release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-phone-apk
          name: Latest phone APK
          body: |
            Automated debug APK build for phone installation.
            versionCode: ${{ github.run_number }}
            versionName: 1.0.${{ github.run_number }}
            commit: ${{ github.sha }}
          files: release/crypto-trade-coach-v${{ github.run_number }}.apk
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
