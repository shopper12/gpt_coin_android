name: Distribute Android APK to Firebase

on:
  workflow_dispatch:
  push:
    branches:
      - fix/runtime-phone-error
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-firebase-distribution.yml'

permissions:
  contents: read

jobs:
  distribute-firebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Decode signing key
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing" >&2
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release-key.jks"

      - name: Build signed release APK
        env:
          CI_KEYSTORE_FILE: ${{ runner.temp }}/release-key.jks
          CI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          CI_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          CI_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase service account
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON secret is missing" >&2
            exit 1
          fi
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Distribute APK to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
        run: |
          if [ -z "$FIREBASE_APP_ID" ]; then
            echo "FIREBASE_APP_ID secret is missing" >&2
            exit 1
          fi
          GROUPS="${FIREBASE_TESTER_GROUPS:-internal-testers}"
          firebase appdistribution:distribute app/build/outputs/apk/release/app-release.apk \
            --app "$FIREBASE_APP_ID" \
            --groups "$GROUPS" \
            --release-notes "Automated build from ${GITHUB_REF_NAME} / ${GITHUB_SHA}"
