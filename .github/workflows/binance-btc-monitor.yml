name: Binance BTC 24h monitor

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'tools/binance_btc_monitor.py'
      - '.github/workflows/binance-btc-monitor.yml'
      - 'reports/binance_btc_best.json'

permissions:
  contents: write

concurrency:
  group: binance-btc-hourly-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy>=1.26" "pandas>=2.2"

      - name: Run live BTC monitor
        run: |
          python tools/binance_btc_monitor.py \
            --symbol BTCUSDT \
            --market futures \
            --interval 5m \
            --rows 6000 \
            --output reports/binance_btc_monitor_latest.json

      - name: Commit latest monitor report
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/binance_btc_monitor_latest.json
          if git diff --cached --quiet; then
            echo "No monitor report change."
            exit 0
          fi
          git commit -m "Update hourly Binance BTC monitor report"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload monitor artifact
        uses: actions/upload-artifact@v4
        with:
          name: binance-btc-monitor-${{ github.run_number }}
          path: reports/binance_btc_monitor_latest.json
          retention-days: 7
