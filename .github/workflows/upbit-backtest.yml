name: Upbit strategy backtest

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Historical days to fetch'
        required: true
        default: '7'
      max_markets:
        description: 'Top KRW markets by current trade value'
        required: true
        default: '60'
      minimum_score:
        description: 'Minimum strategy score'
        required: true
        default: '65'
  schedule:
    - cron: '15 21 * * *'

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Upbit backtest
        run: |
          python tools/backtest_upbit_strategies.py \
            --days "${{ github.event.inputs.days || '7' }}" \
            --max-markets "${{ github.event.inputs.max_markets || '60' }}" \
            --minimum-score "${{ github.event.inputs.minimum_score || '65' }}" \
            --out-dir reports

      - name: Generate rules proposal
        run: |
          python tools/auto_tune_rules.py \
            --backtest reports/backtest_latest.json \
            --rules rules/strategy-rules.json \
            --out-rules reports/proposed_strategy_rules.json \
            --out-plan reports/rules_update_plan.md \
            --out-env reports/auto_tune_decision.env

      - name: Apply proposed rules when guard allows changes
        run: |
          set -euo pipefail
          . reports/auto_tune_decision.env
          if [ "${RULES_CHANGED}" = "true" ]; then
            cp reports/proposed_strategy_rules.json rules/strategy-rules.json
            python -m json.tool rules/strategy-rules.json >/dev/null
          else
            echo "No guarded rule changes proposed."
          fi

      - name: Verify Android debug build after rules update
        run: bash ./gradlew :app:assembleDebug --stacktrace

      - name: Commit updated rules
        run: |
          set -euo pipefail
          if git diff --quiet -- rules/strategy-rules.json; then
            echo "No rules diff to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules/strategy-rules.json
          git commit -m "Auto tune strategy rules"
          git push origin HEAD:main

      - name: Upload backtest reports
        uses: actions/upload-artifact@v4
        with:
          name: upbit-backtest-report
          path: |
            reports/backtest_latest.json
            reports/backtest_latest.md
            reports/proposed_strategy_rules.json
            reports/rules_update_plan.md
            reports/auto_tune_decision.env
          if-no-files-found: error